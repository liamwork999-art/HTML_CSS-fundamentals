<!--This html training index-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HTML and CSS Tutorial" />
    <link rel="stylesheet" href="style.css" />
    <title>Index</title>
  </head>
  <body id="body">
    <h1 id="main-title"><ins>Website</ins></h1>
    <!-- Unordered List -->
    <ul>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>
    <!-- Ordered List -->
    <ol>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ol>

    <!-- Anchor Tags-->
    <ul>
      <li><a href="https://www.youtube.com" target="_blank">YouTube</a></li>
      <li><a href="https://www.github.com" target="_blank">GitHub</a></li>
      <li><a href="https://www.instagram.com" target="_blank">Instagram</a></li>
    </ul>
    <figure>
      <img
        src="https://picsum.photos/300/300"
        alt="Random Image"
        width="300"
        height="300"
      />
      <figcaption>Random Image</figcaption>
      <!-- Containers <div> block and <span> inline -->
    </figure>

    <!-- line breaks, Horizontal rules & Entities -->
    <p>
      Hello <br />
      World!
    </p>

    <pre>
      HELLO      WORLD
             👋
    </pre>
    <code> &lt;h1&gt;This is a Heading&lt;/h1&gt; </code>
    <br />

    <!-- Divs and spans -->
    <div>
      <h1>Header in a div</h1>
      <ul>
        <li>a list in div1</li>
        <li>another list</li>
      </ul>
    </div>
    <!-- Classes and Id's used to identify elements -->

    <!-- Semantic Elements make it more descriptive 
      -> <header> for header
      -> <footer> for footer
      -> <main> for main content
      -> <section> for sections
      -> <article> for articles
      -> <aside> for side content
      -> <nav> for navigation
     -->
  </body>
</html>
